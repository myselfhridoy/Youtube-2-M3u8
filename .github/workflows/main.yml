name: YouTube Live M3U8 Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    paths:
      - 'streams.txt'
      - 'generate.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & dependencies
        run: |
          pip install --upgrade pip requests
          pip install -U --pre "yt-dlp[default]"
          echo "yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          rm -f wgcf-account.toml wgcf-profile.conf 
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "COOKIES_TXT secret missing"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt

      - name: Create directories
        run: |
          mkdir -p logos channels
          touch logos/.gitkeep channels/.gitkeep

      - name: Run playlist generator
        env:
          CF_WORKER_URL: ${{ vars.CF_WORKER_URL || secrets.CF_WORKER_URL }}
        run: |
          echo "Starting generation..."
          python generate.py
          echo "Generation complete"

      # এই নতুন স্টেপটি VPN বন্ধ করবে যেন গিটহাবে পুশ করতে সমস্যা না হয়
      - name: Disconnect Cloudflare WARP
        run: |
          sudo wg-quick down /etc/wireguard/wgcf.conf || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # সব পরিবর্তন স্টেজ করুন
          git add .

          # যদি কোনো পরিবর্তন না থাকে তবে বের হয়ে যান
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
            exit 0
          fi

          # কমিট করুন
          git commit -m "Update playlist - $(date -u +'%Y-%m-%d %H:%M UTC')"

          # পুল করার সময় কোনো unstaged ফাইল থাকলে তা অটো-স্ট্যাশ করে নেবে
          git pull --rebase --autostash origin main

          # পুশ করুন
          git push origin main

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f cookies.txt wgcf-profile.conf wgcf-account.toml 2>/dev/null || true
